name: bank_ui_kit
description: Production-grade Flutter UI component library for mobile banking and fintech apps. Independently themeable, testable, RTL-aware widgets that compose into any host app.
version: 0.1.0
homepage: https://github.com/sayed3li97/bank-ui-kit

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  decimal: ^3.0.0
  intl: ^0.20.1
  fl_chart: ^0.70.0
  collection: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  alchemist: ^0.10.0

flutter:
  uses-material-design: true
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: lib/src/assets/fonts/SpaceGrotesk-Regular.ttf
          weight: 400
        - asset: lib/src/assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: lib/src/assets/fonts/SpaceGrotesk-SemiBold.ttf
          weight: 600
        - asset: lib/src/assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
    - family: Fredoka
      fonts:
        - asset: lib/src/assets/fonts/Fredoka-Regular.ttf
          weight: 400
        - asset: lib/src/assets/fonts/Fredoka-Medium.ttf
          weight: 500
        - asset: lib/src/assets/fonts/Fredoka-SemiBold.ttf
          weight: 600
    - family: Nunito
      fonts:
        - asset: lib/src/assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: lib/src/assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: lib/src/assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: lib/src/assets/fonts/Nunito-Bold.ttf
          weight: 700
