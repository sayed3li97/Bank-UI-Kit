# Publishes the package to pub.dev.
#
# pub.dev's automated publishing only trusts workflows triggered by a git
# tag whose name matches the tag pattern configured on the package's
# Admin > Automated publishing page (default `v{{version}}`). Publishing
# from a branch push is rejected by pub.dev, so this workflow runs only on
# version tags. Authentication is OIDC (`id-token: write`); no secrets or
# stored pub.dev credentials are required.
name: Publish to pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  # Allow a manual run against a chosen tag from the Actions tab.
  workflow_dispatch:

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for pub.dev OIDC authentication
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify the tag matches the pubspec version
        run: |
          pubspec_version="$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | tr -d '[:space:]')"
          tag_version="${GITHUB_REF_NAME#v}"
          echo "pubspec: $pubspec_version, tag: $tag_version"
          if [ "$pubspec_version" != "$tag_version" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match pubspec version ${pubspec_version}."
            exit 1
          fi

      - name: Publish (dry run)
        run: flutter pub publish --dry-run

      - name: Publish
        run: flutter pub publish --force
