# Bridges "merge to main" to "publish to pub.dev".
#
# pub.dev can only be published from a tag push (see publish.yml). This
# workflow watches main for a change to pubspec.yaml and, when the version
# there is one that has not been tagged yet, creates and pushes the
# matching `vX.Y.Z` tag. That tag push then triggers publish.yml.
#
# The tag is pushed with a personal access token (secret RELEASE_TOKEN)
# rather than the default GITHUB_TOKEN, because a tag pushed with
# GITHUB_TOKEN does not start other workflow runs (GitHub's recursion
# guard), so publish.yml would never fire. See the README release section
# for the one-time token setup. If you prefer to tag releases by hand,
# delete this file and push tags yourself: `git tag vX.Y.Z && git push
# origin vX.Y.Z`.
name: Tag release on version bump

on:
  push:
    branches: [main]
    paths:
      - 'pubspec.yaml'

jobs:
  tag:
    name: Tag when the version is new
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # A PAT (contents: write) so the pushed tag triggers publish.yml.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Create and push the version tag if it does not exist
        run: |
          version="$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | tr -d '[:space:]')"
          tag="v${version}"
          if git ls-remote --tags origin "refs/tags/${tag}" | grep -q "${tag}"; then
            echo "Tag ${tag} already exists on origin; nothing to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"
          echo "Pushed ${tag}; publish.yml will now run."
